# Nginx LoadBalancer 服务配置示例（使用 MetalLB）
# 此文件定义了一个 LoadBalancer 类型的服务，使用 MetalLB 作为负载均衡器
# 前提：需要先安装并配置 MetalLB

apiVersion: v1           # Kubernetes API 版本
kind: Service           # 资源类型为 Service
metadata:
  name: nginx-loadbalancer-service   # 服务名称
  namespace: default                 # 命名空间
  labels:
    app: nginx                       # 服务标签

spec:
  selector:             # 选择器，用于匹配 Pod
    app: nginx          # 匹配标签为 app=nginx 的 Pod
  ports:
  - port: 80            # 服务暴露的端口
    targetPort: 80      # Pod 上的目标端口
    protocol: TCP       # 协议类型
  type: LoadBalancer    # 服务类型为 LoadBalancer
  loadBalancerIP: 192.168.1.100  # MetalLB 分配的静态 IP 地址（根据实际网络环境配置）

---

# 部署示例（可选）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: default
  labels:
    app: nginx
spec:
  replicas: 2          # 副本数
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest  # Nginx 镜像
        ports:
        - containerPort: 80   # 容器端口
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"

---

# MetalLB 配置示例（可选）
# 如需使用 MetalLB，请先创建以下配置
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default
  namespace: metallb-system
spec:
  addresses:
  - 192.168.1.100-192.168.1.110  # IP 地址池范围

---

apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default
  namespace: metallb-system
spec:
  ipAddressPools:
  - default
