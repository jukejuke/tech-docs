# Nginx NodePort 服务配置示例
# 此文件定义了一个 NodePort 类型的服务，用于从集群外部访问 Nginx 应用

apiVersion: v1           # Kubernetes API 版本
kind: Service           # 资源类型为 Service
metadata:
  name: nginx-nodeport-service   # 服务名称
  namespace: default              # 命名空间
  labels:
    app: nginx                    # 服务标签

spec:
  selector:             # 选择器，用于匹配 Pod
    app: nginx          # 匹配标签为 app=nginx 的 Pod
  ports:
  - port: 80            # 服务暴露的端口
    targetPort: 80      # Pod 上的目标端口
    nodePort: 30080     # 节点上暴露的端口（30000-32767 范围内）
    protocol: TCP       # 协议类型
  type: NodePort        # 服务类型为 NodePort，可从集群外部访问

---

# 部署示例（可选）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: default
  labels:
    app: nginx
spec:
  replicas: 2          # 副本数
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest  # Nginx 镜像
        ports:
        - containerPort: 80   # 容器端口
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
